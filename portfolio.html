<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>My Gallery</title>
    <link rel="stylesheet" href="sample.css">
    <link rel="stylesheet" href="lightbox.min.css">
    <script type="text/javascript" src="lightbox-plus-jquery.min.js"></script>
  </head>
  <body>
    <div class="gallery">
      <a href="Images/Poster design 4.jpg" data-lightbox="mygallery" data-title="Poster design">
        <img src="Images/Poster design 4.jpg" alt="Poster design">
      </a>
      <a href="Images/Business card 1.jpg" data-lightbox="mygallery" data-title="Business card">
        <img src="Images/Business card 1.jpg" alt="Business card">
      </a>
      <a href="Images/Logo-design-1.png" data-lightbox="mygallery" data-title="Logo">
        <img src="Images/Logo-design-1.png" alt="Logo design">
      </a>
      <a href="Images/calender.HirwaJeanEric-1.0.0.jpg" data-lightbox="mygallery" data-title="Calendar">
        <img src="Images/calender.HirwaJeanEric-1.0.0.jpg" alt="calendar">
      </a>
      <a href="Images/Posterdesign2.jpg" data-lightbox="mygallery" data-title="Poster design">
        <img src="Images/Posterdesign2.jpg" alt="Poster design">
      </a>
      <a href="Images/WebBanner.Hirwa-Jean-Eric.0.0.1.jpg" data-lightbox="mygallery" data-title="WebBanner">
        <img src="Images/WebBanner.Hirwa-Jean-Eric.0.0.1.jpg" alt="Web banner">
      </a>
      <a href="Images/Design250-logo.png" data-lightbox="mygallery" data-title="Design250 log">
        <img src="Images/Design250-logo.png" alt="Design 250 logo">
      </a>
      <a href="Images/Adobe-illustrator-Design250.png" data-lightbox="mygallery" data-title="Adobe illustrator logo">
        <img src="Images/Adobe-illustrator-Design250.png" alt="Adobe Illustrator logo">
      </a>
    </div>
  </body>
</html>
